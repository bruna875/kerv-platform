<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Very Good Peeps</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- ── Login ── -->
<div id="auth">
  <div class="acard">
    <div class="alogo">
      <div class="amark"><img src="https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775830255/Kerv-Logo-1-1_bl2xdt.jpg" alt="Logo" style="width:100%;height:100%;object-fit:contain;border-radius:6px"/></div>
      <span class="alogo-text">Very Good Peeps</span>
    </div>
    <div class="atitle">Sign in</div>
    <div class="asub">Enter your credentials to continue</div>
    <div class="fwrap"><div class="flabel">Email</div><input class="finput" id="em" type="text" value="condoadmin@verygoodpeeps.co" placeholder="you@company.com"/></div>
    <div class="fwrap"><div class="flabel">Password</div><input class="finput" id="pw" type="password" placeholder="••••••••"/></div>
    <div class="aerr" id="err"></div>
    <button class="abtn" id="loginBtn">Sign in</button>
    <div class="demo-creds">
      <div class="demo-creds-label">Demo credentials</div>
      <div><strong>Email:</strong> condoadmin@verygoodpeeps.co</div>
      <div><strong>Password:</strong> HelixCapital</div>
    </div>
  </div>
</div>

<!-- ── App shell ── -->
<div id="app">
  <div class="sbwrap">
    <div class="sb" id="sb">
      <div class="sbhead">
        <div class="lmark"><img src="https://res.cloudinary.com/dhfrgr4qd/image/upload/v1775830255/Kerv-Logo-1-1_bl2xdt.jpg" alt="Logo" style="width:100%;height:100%;object-fit:contain;border-radius:4px"/></div>
        <span class="lname">Very Good Peeps</span>
      </div>
      <nav class="sbnav" id="nav"></nav>
      <div class="sbfoot" id="userBox">
        <div class="avatar" id="av">CA</div>
        <div class="uinfo">
          <div class="uname" id="un">Admin</div>
          <div class="urole">Head of Product</div>
        </div>
        <div class="logoutbtn" id="logoutBtn" title="Sign out">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M6 3H3v10h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 5l3 3-3 3M13 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
    </div>
    <div class="togbtn" id="tog">
      <svg id="togico" width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M6 2L3 5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <span class="breadcrumb">Product &nbsp;/&nbsp; <b id="pgname">Product Roadmap</b></span>
      <span class="tbadge" id="qbadge"></span>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ── Link popup (roadmap) ── -->
<div class="link-popup" id="linkPopup">
  <div class="link-popup-title">Initiative link</div>
  <div class="link-popup-row">
    <input type="url" id="linkInput" placeholder="https://..."/>
    <button class="link-popup-open" id="linkOpenBtn" title="Open link"><svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M6 3H3a1 1 0 00-1 1v9a1 1 0 001 1h9a1 1 0 001-1v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 2h5v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 2L8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
    <button class="link-popup-save" id="linkSaveBtn">Save</button>
    <button class="link-popup-clear" id="linkClearBtn">×</button>
  </div>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<!-- App modules -->
<script src="js/config.js"></script>
<script src="js/icons.js"></script>
<script src="js/loader.js"></script>
<script src="js/roadmap.js"></script>
<script src="js/capacity.js"></script>
<script src="js/app.js"></script>
</body>
</html>
